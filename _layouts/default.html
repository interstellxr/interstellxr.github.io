<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <meta name="google-site-verification" content="R5z5bWOv0ihWgsKMaTFSbDTjelhwFjrO29T6_r16McU" />
   
    <!-- Core SEO Tags -->
    <title>{{ page.title }} | {{ site.name }}</title>
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="Huckleberry Thums">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph (For clean link previews on LinkedIn/Socials) -->
    <meta property="og:title" content="{{ page.title }} | {{ site.name }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:type" content="profile">

    <!-- Main Stylesheet -->
    <link rel="stylesheet" type="text/css" href="/assets/css/main.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="/" class="nav-logo">{{ site.name }}</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/cv">CV</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/portfolio">Portfolio</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        {{ content }}
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.name }}</p>
            <ul class="footer-socials">
                <li><a href="mailto:{{ site.email }}">Email</a></li>
                <li><a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a></li>
                <li><a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank">LinkedIn</a></li>
                {% if site.orcid %}
                <li><a href="https://orcid.org/{{ site.orcid }}" target="_blank">ORCID</a></li>
                {% endif %}
            </ul>
        </div>
    </footer>
    <script data-goatcounter="https://interstellxr.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
